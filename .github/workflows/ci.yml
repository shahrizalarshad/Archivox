name: Archivox CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        
    - name: Copy .env
      run: cp .env.example .env
        
    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      
    - name: Generate key
      run: php artisan key:generate
      
    - name: Execute tests (PHPUnit)
      run: vendor/bin/phpunit

  frontend-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Run Vitest
      run: npm run test:unit

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Prepare Backend Environment
      working-directory: ./backend
      run: cp .env.example .env && touch database/database.sqlite

    - name: Set DB for testing
      working-directory: ./backend
      run: |
        sed -i 's/DB_CONNECTION=mysql/DB_CONNECTION=sqlite/' .env
        sed -i 's/DB_DATABASE=archivox_db/DB_DATABASE=\/var\/www\/database\/database.sqlite/' .env

    - name: Start services via Docker Compose
      run: docker compose up -d
        
    - name: Wait for services to be ready
      run: sleep 15
        
    - name: Run Backend Setup
      run: |
        docker compose exec -T laravel-app composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
        docker compose exec -T laravel-app php artisan key:generate
        docker compose exec -T laravel-app php artisan migrate --force
        
    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm ci
      
    - name: Install Playwright Browsers
      working-directory: ./frontend
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      working-directory: ./frontend
      run: npm run test:e2e
      
    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 10
